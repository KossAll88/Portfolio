  <script>
    // Бургер-меню
    const burger = document.getElementById('burger');
    const mobileMenu = document.getElementById('mobile-menu');
    const line1 = document.getElementById('line1');
    const line2 = document.getElementById('line2');
    const line3 = document.getElementById('line3');

    let isOpen = false;

    burger.addEventListener('click', () => {
      isOpen = !isOpen;

      if (isOpen) {
        mobileMenu.classList.remove('hidden');
        mobileMenu.classList.add('flex', 'flex-col');

        line1.style.transform = 'rotate(45deg) translate(5px, 6px)';
        line2.style.opacity = '0';
        line3.style.transform = 'rotate(-45deg) translate(6px, -6px)';
      } else {
        mobileMenu.classList.add('hidden');
        mobileMenu.classList.remove('flex', 'flex-col');

        line1.style.transform = 'rotate(0)';
        line2.style.opacity = '1';
        line3.style.transform = 'rotate(0)';
      }
    });

    // Закрывать меню при клике на ссылку
    document.querySelectorAll('#mobile-menu a').forEach(link => {
      link.addEventListener('click', () => {
        isOpen = false;
        mobileMenu.classList.add('hidden');
        mobileMenu.classList.remove('flex', 'flex-col');
        
        line1.style.transform = 'rotate(0)';
        line2.style.opacity = '1';
        line3.style.transform = 'rotate(0)';
      });
    });

    // Инициализация AOS
    AOS.init({
      duration: 1100,
      once: true,
      offset: 80
    });
  </script>
