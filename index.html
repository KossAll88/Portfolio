<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matvii — Artist & Illustrator</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap');

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background-color: #f8f1e9;
    }
    
    .heading {
      font-family: 'Playfair Display', serif;
    }

    .accent-brown {
      color: #5c4033;
    }
    
    .hero {
      background: linear-gradient(135deg, #5c4033 0%, #8d6e63 100%);
    }
  </style>
</head>
<body class="text-[#3f2a1e]">

  <!-- Navigation -->
  <nav class="fixed top-0 w-full bg-[#f8f1e9]/95 backdrop-blur-md z-50 border-b border-[#d4c3b0]">
    <div class="max-w-6xl mx-auto px-5 py-4 flex justify-between items-center">
      
      <!-- Логотип -->
      <div class="text-2xl md:text-3xl font-bold heading tracking-tight accent-brown">
        Matvii
      </div>

      <!-- Десктопное меню -->
      <div class="hidden md:flex gap-8 text-base md:text-lg font-medium">
        <a href="index.html" class="hover:text-[#8d6e63] transition-colors">Home</a>
        <a href="projects.html" class="hover:text-[#8d6e63] transition-colors">Projects</a>
        <a href="about.html" class="hover:text-[#8d6e63] transition-colors">About</a>
        <a href="contact.html" class="hover:text-[#8d6e63] transition-colors">Contact</a>
      </div>

      <!-- Бургер-кнопка -->
      <button id="burger" 
              class="md:hidden w-10 h-10 flex flex-col justify-center items-center gap-1.5 z-50 focus:outline-none">
        <span id="line1" 
              class="block w-6 h-0.5 bg-[#3f2a1e] transition-all duration-300 origin-center"></span>
        <span id="line2" 
              class="block w-6 h-0.5 bg-[#3f2a1e] transition-all duration-300 origin-center"></span>
        <span id="line3" 
              class="block w-6 h-0.5 bg-[#3f2a1e] transition-all duration-300 origin-center"></span>
      </button>
    </div>

    <!-- Мобильное меню -->
    <div id="mobile-menu" 
         class="hidden md:hidden fixed top-[73px] left-0 w-full bg-[#f8f1e9] border-b border-[#d4c3b0] py-8 px-5 shadow-xl">
      <div class="flex flex-col gap-6 text-center text-lg font-medium">
        <a href="index.html" class="hover:text-[#8d6e63] transition-colors py-3">Home</a>
        <a href="projects.html" class="hover:text-[#8d6e63] transition-colors py-3">Projects</a>
        <a href="about.html" class="hover:text-[#8d6e63] transition-colors py-3">About</a>
        <a href="contact.html" class="hover:text-[#8d6e63] transition-colors py-3">Contact</a>
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="hero min-h-screen flex items-center relative text-white">
    <div class="max-w-6xl mx-auto px-5 md:px-6 pt-20 md:pt-24">
      <div data-aos="fade-up" class="max-w-xl md:max-w-2xl">
        <h1 class="text-5xl md:text-6xl lg:text-7xl font-bold heading leading-tight mb-6">
          Hello, I'm <span class="text-[#f8f1e9]">Matvii</span>
        </h1>
        <p class="text-xl md:text-2xl lg:text-3xl opacity-90 mb-10 leading-tight">
          Artist & Illustrator<br>
          Creating warm and atmospheric illustrations
        </p>
        
        <div class="flex flex-col sm:flex-row gap-4">
          <a href="projects.html" 
             class="px-8 py-4 bg-white text-[#5c4033] font-semibold rounded-2xl hover:scale-105 active:scale-95 transition-all text-center shadow-lg">
            View My Projects
          </a>
          <a href="contact.html" 
             class="px-8 py-4 border-2 border-white/80 font-semibold rounded-2xl hover:bg-white/10 transition-all text-center">
            Get In Touch
          </a>
        </div>
      </div>
    </div>
  </section>

  <script>
    // Бургер-меню
    const burger = document.getElementById('burger');
    const mobileMenu = document.getElementById('mobile-menu');
    const line1 = document.getElementById('line1');
    const line2 = document.getElementById('line2');
    const line3 = document.getElementById('line3');

    let isOpen = false;

    burger.addEventListener('click', () => {
      isOpen = !isOpen;

      if (isOpen) {
        mobileMenu.classList.remove('hidden');
        mobileMenu.classList.add('flex', 'flex-col');

        // Анимация бургера в крестик
        line1.style.transform = 'rotate(45deg) translate(5px, 6px)';
        line2.style.opacity = '0';
        line3.style.transform = 'rotate(-45deg) translate(6px, -6px)';
      } else {
        mobileMenu.classList.add('hidden');
        mobileMenu.classList.remove('flex', 'flex-col');

        // Возврат в бургер
        line1.style.transform = 'rotate(0)';
        line2.style.opacity = '1';
        line3.style.transform = 'rotate(0)';
      }
    });

    // Закрывать меню при клике на ссылку
    document.querySelectorAll('#mobile-menu a').forEach(link => {
      link.addEventListener('click', () => {
        isOpen = false;
        mobileMenu.classList.add('hidden');
        mobileMenu.classList.remove('flex', 'flex-col');
        
        line1.style.transform = 'rotate(0)';
        line2.style.opacity = '1';
        line3.style.transform = 'rotate(0)';
      });
    });

    // Инициализация AOS
    AOS.init({
      duration: 1000,
      once: true,
      offset: 80
    });
  </script>
</body>
</html>
